name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-test-and-lint:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Ktlint check (Linux)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon ktlintCheck

      - name: Assemble project (Linux)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon assemble

      - name: Unit tests (Linux)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon test

      - name: E2E tests (Linux)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon e2eTest

      - name: Smoke run application (Linux)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon run --args="--help"

      - name: Ktlint check (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon ktlintCheck

      - name: Assemble project (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon assemble

      - name: Unit tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon test

      - name: E2E tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon e2eTest

      - name: Smoke run application (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon run --args="--help"
