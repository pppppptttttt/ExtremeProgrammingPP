kotlin.code.style=official

# WSL и каталог проекта на диске Windows (/mnt/c/): Gradle кэширует хэши в .gradle/ и иногда
# не может взять блокировку (fileHashes.lock) — параллельный daemon, IDE или битый кэш.
# Что сделать: ./gradlew --stop; закрыть другие сборки; при зависании — удалить каталог .gradle
# в корне проекта и пересобрать. Надёжнее держать репозиторий на ФС Linux (~/...), не на /mnt/c/.
org.gradle.vfs.watch=false
